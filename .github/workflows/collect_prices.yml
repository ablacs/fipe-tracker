name: Coleta Mensal de Preços FIPE

on:
  schedule:
    - cron: "0 9 1 * *" # Todo dia 1 do mês às 9h UTC (6h Brasília)
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para commitar o CSV

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests pandas

      - name: Coletar preços
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/collect_prices.py

      - name: Commitar histórico atualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add historico.csv
          git diff --staged --quiet || git commit -m "data: coleta mensal $(date +'%Y-%m')"
          git push
